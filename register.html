<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Ký Thành Viên | Burger VN</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --orange: #FF5733;
      --orange-dark: #D94528;
      --dark: #111;
      --dark-2: #1a1a1a;
      --white: #fff;
      --border: rgba(255,255,255,0.08);
      --muted: #888;
      --muted-2: #bbb;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }

    /* NAV ĐỒNG NHẤT */
    header { background: #0a0a0a; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    nav { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 58px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Oswald', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--orange); cursor: pointer; }
    .logo span { color: #fff; }
    nav ul { display: flex; gap: 15px; list-style: none; }
    nav ul a { font-size: 0.76rem; font-weight: 700; text-transform: uppercase; color: #aaa; transition: color .2s; }
    nav ul a:hover { color: var(--orange); }
    .nav-icons { display: flex; gap: 5px; }
    .nav-icons button { background: none; border: none; cursor: pointer; color: #aaa; width: 36px; height: 36px; display: grid; place-items: center; transition: color .2s; }
    .nav-icons button:hover { color: var(--orange); }
    .nav-icons svg { width: 19px; height: 19px; }

    /* REGISTER WRAPPER */
    .register-wrapper {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: stretch;
    }

    /* LEFT: Visual */
    .register-visual {
      position: relative;
      background: url('https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=900') center/cover no-repeat;
    }
    .register-visual::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.9) 100%);
    }
    .register-visual-content {
      position: relative; z-index: 1;
      padding: 64px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
    }
    .register-visual-content h2 { font-family: 'Oswald', sans-serif; font-size: 3rem; text-transform: uppercase; line-height: 1.1; }
    .register-visual-content h2 span { color: var(--orange); }

    /* RIGHT: Form */
    .register-form-side {
      background: var(--dark-2);
      padding: 60px 8vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .form-header { margin-bottom: 30px; }
    .form-header h1 { font-family: 'Oswald', sans-serif; font-size: 2.2rem; text-transform: uppercase; margin-bottom: 5px; }
    .form-header p { color: var(--muted-2); font-size: 0.9rem; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--muted-2); letter-spacing: 1px; }
    
    .form-group input {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      outline: none;
      transition: 0.3s;
    }
    .form-group input:focus { border-color: var(--orange); background: rgba(255,255,255,0.06); }

    /* Checkbox Terms */
    .terms-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; cursor: pointer; font-size: 0.85rem; color: var(--muted-2); }
    .terms-wrap input { display: none; }
    .cb-custom { width: 18px; height: 18px; border: 2px solid #555; border-radius: 4px; display: grid; place-items: center; flex-shrink: 0; }
    .terms-wrap input:checked + .cb-custom { background: var(--orange); border-color: var(--orange); }
    .terms-wrap input:checked + .cb-custom::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

    .btn-register {
      width: 100%;
      padding: 16px;
      background: var(--orange);
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 1px;
    }
    .btn-register:hover { background: var(--orange-dark); transform: translateY(-2px); }

    .login-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--muted-2); }
    .login-link a { color: var(--orange); font-weight: 700; }
    .login-link a:hover { text-decoration: underline; }

    @media (max-width: 860px) {
      .register-wrapper { grid-template-columns: 1fr; }
      .register-visual { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: span 1; }
      .register-form-side { padding: 40px 24px; }
    }
  </style>
</head>
<body>

<header>
  <nav>
    <div class="logo" onclick="window.location.href='index.html'">Burger<span>VN</span></div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="reservation.html">Reservation</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-icons">
      <button aria-label="Tìm kiếm"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="7" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke-width="2" stroke-linecap="round"/></svg></button>
      
      <button aria-label="Tài khoản" onclick="window.location.href='login.html'">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </button>
      
      <button aria-label="Giỏ hàng" onclick="window.location.href='cart.html'">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 6h13M10 19a1 1 0 100 2 1 1 0 000-2zm8 0a1 1 0 100 2 1 1 0 000-2z"/></svg>
      </button>
    </div>
  </nav>
</header>

<main class="register-wrapper">
  <div class="register-visual">
    <div class="register-visual-content">
      <h2>GIA NHẬP<br/>CỘNG ĐỒNG<br/><span>BURGER VN</span></h2>
    </div>
  </div>

  <div class="register-form-side">
    <div class="form-header">
      <h1>Tạo Tài Khoản</h1>
      <p>Đăng ký để nhận ưu đãi giảm giá 20% cho đơn hàng đầu tiên.</p>
    </div>

    <form id="regForm" onsubmit="event.preventDefault(); alert('Đăng ký thành công!');">
      <div class="form-grid">
        <div class="form-group full">
          <label for="full-name">Họ và tên</label>
          <input type="text" id="full-name" placeholder="Nhập họ tên của bạn" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="ndd@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Số điện thoại</label>
          <input type="tel" id="phone" placeholder="0901234567" required>
        </div>

        <div class="form-group">
          <label for="pass">Mật khẩu</label>
          <input type="password" id="pass" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <label for="re-pass">Xác nhận mật khẩu</label>
          <input type="password" id="re-pass" placeholder="••••••••" required>
        </div>
      </div>

      <label class="terms-wrap">
        <input type="checkbox" required>
        <span class="cb-custom"></span>
        Tôi đồng ý với các Điều khoản & Chính sách của nhà hàng.
      </label>

      <button type="submit" class="btn-register">Đăng Ký Ngay</button>

      <div class="login-link">
        Đã có tài khoản? <a href="login.html">Đăng nhập</a>
      </div>
    </form>
  </div>
</main>

</body>
</html>
