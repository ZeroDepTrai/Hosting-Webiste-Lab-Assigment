<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Đăng ký tài khoản BMW Việt Nam để nhận ưu đãi độc quyền, quản lý xe và đặt lịch dịch vụ dễ dàng."/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Đăng Ký – BMW Việt Nam</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- nav injected by shared.js -->

  <main>
    <div class="auth-wrapper">
      <!-- HERO SIDE -->
      <div class="auth-hero" aria-hidden="true">
        <div class="auth-hero-content">
          <h2>Tham Gia<br/>Cộng Đồng<br/>BMW</h2>
          <p>Tạo tài khoản để nhận ưu đãi độc quyền, quản lý xe và đặt lịch dịch vụ mọi lúc mọi nơi.</p>
        </div>
      </div>

      <!-- FORM SIDE -->
      <div class="auth-panel">
        <div class="auth-logo">
          <svg width="44" height="44" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="none" stroke="#333" stroke-width="3"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M50 12 A38 38 0 0 1 88 50 L50 50 Z" fill="#1c69d4"/>
            <path d="M50 88 A38 38 0 0 1 12 50 L50 50 Z" fill="#1c69d4"/>
            <path d="M88 50 A38 38 0 0 1 50 88 L50 50 Z" fill="white"/>
            <path d="M12 50 A38 38 0 0 1 50 12 L50 50 Z" fill="white"/>
          </svg>
          <span>BMW VIỆT NAM</span>
        </div>

        <h1 class="auth-title">Tạo Tài Khoản</h1>
        <p class="auth-sub">Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập</a></p>

        <div class="form-row">
          <div class="form-group">
            <label for="reg-fname">Họ</label>
            <input type="text" id="reg-fname" placeholder="Nguyễn" autocomplete="given-name"/>
          </div>
          <div class="form-group">
            <label for="reg-lname">Tên</label>
            <input type="text" id="reg-lname" placeholder="Văn A" autocomplete="family-name"/>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">Email *</label>
          <input type="email" id="reg-email" placeholder="email@example.com" autocomplete="email" required/>
        </div>

        <div class="form-group">
          <label for="reg-phone">Số điện thoại</label>
          <input type="tel" id="reg-phone" placeholder="0912 345 678" autocomplete="tel"/>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="reg-pass">Mật khẩu *</label>
            <input type="password" id="reg-pass" placeholder="Tối thiểu 8 ký tự" autocomplete="new-password" required/>
          </div>
          <div class="form-group">
            <label for="reg-confirm">Xác nhận mật khẩu *</label>
            <input type="password" id="reg-confirm" placeholder="Nhập lại mật khẩu" autocomplete="new-password" required/>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-interest">Quan tâm đến</label>
          <select id="reg-interest">
            <option value="">Chọn dòng xe quan tâm</option>
            <option>BMW 3 Series</option>
            <option>BMW 5 Series</option>
            <option>BMW 7 Series</option>
            <option>BMW X Series (SUV)</option>
            <option>BMW M Series</option>
            <option>BMW i Series (Xe Điện)</option>
          </select>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" required/>
          <label for="terms">Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> và <a href="#">Chính sách bảo mật</a> của BMW Việt Nam.</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="newsletter"/>
          <label for="newsletter">Nhận thông tin ưu đãi và tin tức mới nhất từ BMW Việt Nam qua email.</label>
        </div>

        <button class="btn btn-primary" style="width:100%;padding:1rem;" onclick="handleRegister()">Tạo Tài Khoản</button>
        <p class="auth-link">Đã có tài khoản? <a href="dang-nhap.html">Đăng nhập ngay</a></p>
      </div>
    </div>
  </main>

  <!-- footer injected by shared.js -->
  <script src="shared.js"></script>
  <script>
    function handleRegister() {
      const email   = document.getElementById('reg-email').value;
      const pass    = document.getElementById('reg-pass').value;
      const confirm = document.getElementById('reg-confirm').value;
      const terms   = document.getElementById('terms').checked;

      if (!email || !pass) {
        showToast('Vui lòng nhập đầy đủ email và mật khẩu.');
        return;
      }
      if (pass.length < 8) {
        showToast('Mật khẩu phải có ít nhất 8 ký tự.');
        return;
      }
      if (pass !== confirm) {
        showToast('Mật khẩu xác nhận không khớp. Vui lòng kiểm tra lại.');
        return;
      }
      if (!terms) {
        showToast('Vui lòng đồng ý với điều khoản sử dụng để tiếp tục.');
        return;
      }
      showToast('Tạo tài khoản thành công! Chào mừng bạn đến với BMW Việt Nam.');
      setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    }
  </script>
</body>
</html>
