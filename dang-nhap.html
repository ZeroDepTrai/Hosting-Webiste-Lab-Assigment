<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Đăng nhập tài khoản BMW Việt Nam để quản lý xe, đặt lịch dịch vụ và nhận ưu đãi độc quyền."/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Đăng Nhập – BMW Việt Nam</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- nav injected by shared.js -->

  <main>
    <div class="auth-wrapper">
      <!-- HERO SIDE -->
      <div class="auth-hero" aria-hidden="true">
        <div class="auth-hero-content">
          <h2>Chào Mừng<br/>Trở Lại</h2>
          <p>Đăng nhập để truy cập tài khoản BMW của bạn và quản lý toàn bộ dịch vụ một cách thuận tiện nhất.</p>
        </div>
      </div>

      <!-- FORM SIDE -->
      <div class="auth-panel">
        <div class="auth-logo">
          <svg width="44" height="44" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="none" stroke="#333" stroke-width="3"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M50 12 A38 38 0 0 1 88 50 L50 50 Z" fill="#1c69d4"/>
            <path d="M50 88 A38 38 0 0 1 12 50 L50 50 Z" fill="#1c69d4"/>
            <path d="M88 50 A38 38 0 0 1 50 88 L50 50 Z" fill="white"/>
            <path d="M12 50 A38 38 0 0 1 50 12 L50 50 Z" fill="white"/>
          </svg>
          <span>BMW VIỆT NAM</span>
        </div>

        <h1 class="auth-title">Đăng Nhập</h1>
        <p class="auth-sub">Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a></p>

        <div class="auth-social">
          <button type="button">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Tiếp tục với Google
          </button>
          <button type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>

        <div class="auth-divider"><span>Hoặc đăng nhập bằng email</span></div>

        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="email@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="login-pass">Mật khẩu</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <a href="#" class="forgot-link">Quên mật khẩu?</a>

        <button class="btn btn-primary" style="width:100%;padding:1rem;" onclick="handleLogin()">Đăng Nhập</button>
        <p class="auth-link">Chưa có tài khoản? <a href="dang-ky.html">Tạo tài khoản</a></p>
      </div>
    </div>
  </main>

  <!-- footer injected by shared.js -->
  <script src="shared.js"></script>
  <script>
    function handleLogin() {
      const email = document.getElementById('login-email').value;
      const pass  = document.getElementById('login-pass').value;
      if (!email || !pass) {
        showToast('Vui lòng nhập đầy đủ email và mật khẩu.');
        return;
      }
      showToast('Đăng nhập thành công! Chào mừng bạn trở lại.');
      setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    }
  </script>
</body>
</html>
